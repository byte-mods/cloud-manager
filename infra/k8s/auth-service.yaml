apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: cloud-manager
  labels:
    app: auth-service
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        component: backend
    spec:
      containers:
        - name: auth-service
          image: cloud-manager/auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: cloud-manager-config
            - secretRef:
                name: cloud-manager-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: cloud-manager
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
