apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: cloud-manager
  labels:
    app: gateway
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        component: backend
    spec:
      containers:
        - name: gateway
          image: cloud-manager/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: cloud-manager-config
            - secretRef:
                name: cloud-manager-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: cloud-manager
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
