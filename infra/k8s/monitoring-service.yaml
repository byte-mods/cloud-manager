apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-service
  namespace: cloud-manager
  labels:
    app: monitoring-service
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitoring-service
  template:
    metadata:
      labels:
        app: monitoring-service
        component: backend
    spec:
      containers:
        - name: monitoring-service
          image: cloud-manager/monitoring-service:latest
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: cloud-manager-config
            - secretRef:
                name: cloud-manager-secrets
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-service
  namespace: cloud-manager
spec:
  selector:
    app: monitoring-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
