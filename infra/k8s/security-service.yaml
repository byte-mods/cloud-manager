apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-service
  namespace: cloud-manager
  labels:
    app: security-service
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: security-service
  template:
    metadata:
      labels:
        app: security-service
        component: backend
    spec:
      containers:
        - name: security-service
          image: cloud-manager/security-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: cloud-manager-config
            - secretRef:
                name: cloud-manager-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: security-service
  namespace: cloud-manager
spec:
  selector:
    app: security-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
