apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: cloud-manager
  labels:
    app: analytics-service
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        component: backend
    spec:
      containers:
        - name: analytics-service
          image: cloud-manager/analytics-service:latest
          ports:
            - containerPort: 8088
          envFrom:
            - configMapRef:
                name: cloud-manager-config
            - secretRef:
                name: cloud-manager-secrets
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: cloud-manager
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8088
      targetPort: 8088
  type: ClusterIP
