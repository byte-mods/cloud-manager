global:
  environment: production
  imageRegistry: "123456789.dkr.ecr.us-east-1.amazonaws.com"

web:
  replicas: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env:
    NEXTAUTH_URL: "https://cloud-manager.example.com"

gateway:
  replicas: 4
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

services:
  - name: auth-service
    port: 8081
    replicas: 3
    resources:
      requests: { cpu: 250m, memory: 256Mi }
      limits: { cpu: "1", memory: 512Mi }
  - name: cloud-service
    port: 8082
    replicas: 4
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits: { cpu: "2", memory: 1Gi }
  - name: security-service
    port: 8083
    replicas: 3
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits: { cpu: "2", memory: 1Gi }
  - name: monitoring-service
    port: 8084
    replicas: 3
    resources:
      requests: { cpu: 300m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
  - name: cost-service
    port: 8085
    replicas: 2
    resources:
      requests: { cpu: 250m, memory: 256Mi }
      limits: { cpu: "1", memory: 512Mi }
  - name: claude-ai-service
    port: 8086
    replicas: 3
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits: { cpu: "2", memory: 1Gi }
  - name: data-engineering-service
    port: 8087
    replicas: 2
    resources:
      requests: { cpu: 250m, memory: 256Mi }
      limits: { cpu: "1", memory: 512Mi }
  - name: analytics-service
    port: 8088
    replicas: 2
    resources:
      requests: { cpu: 300m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
  - name: tutorial-service
    port: 8089
    replicas: 2
    resources:
      requests: { cpu: 250m, memory: 256Mi }
      limits: { cpu: "1", memory: 512Mi }

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/rate-limit: "200"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: cloud-manager.example.com
      paths:
        - path: /
          service: web
    - host: api.cloud-manager.example.com
      paths:
        - path: /
          service: gateway
  tls:
    - secretName: cloud-manager-tls
      hosts:
        - cloud-manager.example.com
        - api.cloud-manager.example.com

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilization: 70

config:
  RUST_LOG: "info"
  CLOUD_USE_MOCK_DATA: "false"
  JWT_EXPIRY: "900"
  CORS_ORIGINS: "https://cloud-manager.example.com"
