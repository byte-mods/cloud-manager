apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-service
  namespace: cloud-manager
  labels:
    app: cloud-service
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloud-service
  template:
    metadata:
      labels:
        app: cloud-service
        component: backend
    spec:
      containers:
        - name: cloud-service
          image: cloud-manager/cloud-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: cloud-manager-config
            - secretRef:
                name: cloud-manager-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-service
  namespace: cloud-manager
spec:
  selector:
    app: cloud-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
