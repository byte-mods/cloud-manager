[package]
name = "cloud-sdk-wrapper"
version = "0.1.0"
edition = "2021"
description = "Unified cloud SDK wrapper for AWS, GCP, and Azure"

[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
thiserror = "2"
tracing = "0.1"
