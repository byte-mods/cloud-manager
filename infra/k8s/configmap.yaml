apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-manager-config
  namespace: cloud-manager
data:
  RUST_LOG: "info"
  SURREAL_DB_PATH: "/data"
  GATEWAY_URL: "http://gateway-service:8080"
  AUTH_SERVICE_URL: "http://auth-service:8081"
  CLOUD_SERVICE_URL: "http://cloud-service:8082"
  SECURITY_SERVICE_URL: "http://security-service:8083"
  MONITORING_SERVICE_URL: "http://monitoring-service:8084"
  COST_SERVICE_URL: "http://cost-service:8085"
  CLAUDE_AI_SERVICE_URL: "http://claude-ai-service:8086"
  DATA_ENGINEERING_SERVICE_URL: "http://data-engineering-service:8087"
  ANALYTICS_SERVICE_URL: "http://analytics-service:8088"
  TUTORIAL_SERVICE_URL: "http://tutorial-service:8089"
  CLOUD_USE_MOCK_DATA: "false"
  JWT_EXPIRY: "900"
  CORS_ORIGINS: "https://cloud-manager.example.com"
