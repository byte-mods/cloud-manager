{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cloud-manager.fullname" . }}
  labels:
    {{- include "cloud-manager.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - secretName: {{ .secretName }}
      hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                {{- if eq .service "web" }}
                name: {{ include "cloud-manager.fullname" $ }}-web
                port:
                  number: {{ $.Values.web.port }}
                {{- else if eq .service "gateway" }}
                name: {{ include "cloud-manager.fullname" $ }}-gateway
                port:
                  number: {{ $.Values.gateway.port }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
